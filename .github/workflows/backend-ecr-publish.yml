name: Publish Backend Image

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-ecr-production
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        shell: bash
        run: |
          missing=0
          for name in AWS_ROLE_ARN AWS_REGION ECR_REPOSITORY; do
            if [[ -z "${!name}" ]]; then
              echo "::error::${name} is missing from the production environment variables"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and test
        run: npm run check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: "402010193138"
          role-session-name: SpeedFeastBackend-${{ github.run_id }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate immutable image tag
        id: image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          short_sha="${GITHUB_SHA:0:12}"
          image_tag="sha-${short_sha}-run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${image_tag}"
          echo "tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "uri=${image_uri}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.uri }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=speedfeast-backend
          cache-to: type=gha,mode=max,scope=speedfeast-backend

      - name: Write publication summary
        shell: bash
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "### Backend image published"
            echo
            echo "- Image: \`${IMAGE_URI}\`"
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Platform: \`linux/amd64\`"
          } >> "${GITHUB_STEP_SUMMARY}"
