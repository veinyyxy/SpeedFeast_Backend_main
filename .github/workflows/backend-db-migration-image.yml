name: Publish Database Migration Image

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-db-migration-image-production
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push migration image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
      image_repository: ${{ steps.image.outputs.repository }}
      image_digest: ${{ steps.push.outputs.digest }}

    env:
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        shell: bash
        run: |
          missing=0
          for name in AWS_ROLE_ARN AWS_REGION ECR_REPOSITORY; do
            if [[ -z "${!name}" ]]; then
              echo "::error::${name} is missing from the production environment variables"
              missing=1
            fi
          done

          if [[ ! -f Dockerfile.migration ]]; then
            echo "::error::Dockerfile.migration does not exist"
            missing=1
          fi

          exit "${missing}"

      - name: Validate migration script syntax
        shell: bash
        run: bash -n scripts/run-rds-migration.sh

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check application
        run: npm run check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.2
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: "402010193138"
          role-session-name: SpeedFeastDbMigration-${{ github.run_id }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate immutable image tag
        id: image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          short_sha="${GITHUB_SHA:0:12}"
          image_tag="migration-sha-${short_sha}-run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          image_repository="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          image_uri="${image_repository}:${image_tag}"
          echo "tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "repository=${image_repository}" >> "${GITHUB_OUTPUT}"
          echo "uri=${image_uri}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push migration image
        id: push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile.migration
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.uri }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=SpeedFeast database migration
          cache-from: type=gha,scope=speedfeast-db-migration
          cache-to: type=gha,mode=max,scope=speedfeast-db-migration

      - name: Write publication summary
        shell: bash
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "### Database migration image published"
            echo
            echo "- Image: \`${IMAGE_URI}\`"
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Pinned reference: \`${IMAGE_REPOSITORY}@${IMAGE_DIGEST}\`"
            echo "- Platform: \`linux/amd64\`"
            echo
            echo "This image contains migration tools only. It does not contain a database dump."
          } >> "${GITHUB_STEP_SUMMARY}"
