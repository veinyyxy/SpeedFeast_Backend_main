name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and test
        run: npm run check

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: >-
          docker build
          --label "org.opencontainers.image.revision=${GITHUB_SHA}"
          --tag speedfeast-backend:ci
          .

      - name: Inspect Docker image
        run: docker image inspect speedfeast-backend:ci

      - name: Smoke test production container
        shell: bash
        run: |
          container_id=$(docker run --detach \
            --publish 127.0.0.1:3000:3000 \
            --env CORS_ALLOWED_ORIGINS=https://buyer.example.invalid \
            --env HMAC_SECRET_KEY=ci-hmac-secret \
            --env JWT_SECRET_KEY=ci-jwt-secret \
            --env JWT_EXPIRES_IN=1h \
            --env MERCHANT_JWT_EXPIRES_IN=1h \
            --env DATABASE_URL=postgresql://ci:ci@database.invalid/speedfeast \
            --env PAYMENT_PROVIDER=stripe \
            --env STRIPE_SECRET_KEY=sk_test_ci \
            --env STRIPE_PUBLISHABLE_KEY=pk_test_ci \
            --env STRIPE_WEBHOOK_SECRET=whsec_ci \
            --env STRIPE_SUCCESS_URL=https://buyer.example.invalid/payment-success \
            --env STRIPE_CANCEL_URL=https://buyer.example.invalid/payment-cancel \
            --env SMS_PROVIDER=demo \
            --env IMAGE_STORAGE_PROVIDER=s3 \
            --env IMAGE_S3_BUCKET=ci-images \
            --env IMAGE_PUBLIC_BASE_URL=https://images.example.invalid \
            --env AWS_REGION=ca-central-1 \
            speedfeast-backend:ci)

          cleanup() {
            docker rm --force "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1
